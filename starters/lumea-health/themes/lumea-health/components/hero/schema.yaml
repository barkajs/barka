label: Hero
icon: star
description: "Full-width hero with heading, subheading, CTA, and search bar."
status: stable
fields:
  heading:
    type: text
    label: Heading
    required: true
  subheading:
    type: textarea
    label: Subheading
  image:
    type: media
    label: Background Image
  cta_text:
    type: text
    label: CTA Button Text
  cta_url:
    type: text
    label: CTA Button URL
  cta_secondary_text:
    type: text
    label: Secondary CTA Text
  cta_secondary_url:
    type: text
    label: Secondary CTA URL
  show_search:
    type: boolean
    label: Show Search Bar
    default: true
  alignment:
    type: select
    label: Alignment
    options: [left, center, right]
    default: center
