label: Text with Image
icon: image
description: "Two-column text and image."
status: stable
fields:
  heading:
    type: text
    label: Heading
  body:
    type: textarea
    label: Body
    required: true
  image:
    type: media
    label: Image
    required: true
  image_position:
    type: select
    label: Image Position
    options: [left, right]
    default: right
  image_alt:
    type: text
    label: Image Alt Text
  cta_text:
    type: text
    label: Button Text
  cta_url:
    type: text
    label: Button URL
