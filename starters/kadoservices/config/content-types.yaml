article:
  label: Article
  path_pattern: "/articles/{slug}"
  listing_title: "Insights"
  listing_subtitle: "Hiring trends, HR strategy, and workforce management"
  fields:
    summary:
      type: textarea
      label: Summary
      required: false
    featured_image:
      type: media
      label: Featured Image
    category:
      type: select
      label: Category
      options:
        - hiring-trends
        - hr-strategy
        - labor-law
        - employer-branding
        - workforce-management
    tags:
      type: text
      label: Tags

page:
  label: Page
  path_pattern: "/{slug}"
  fields:
    subtitle:
      type: text
      label: Subtitle
    featured_image:
      type: media
      label: Featured Image

landing_page:
  label: Landing Page
  path_pattern: "/{slug}"
  fields:
    subtitle:
      type: text
      label: Subtitle
    cta_text:
      type: text
      label: CTA Button Text
    cta_url:
      type: text
      label: CTA Button URL

service:
  label: Service
  path_pattern: "/services/{slug}"
  listing_title: "Our Services"
  fields:
    short_description:
      type: textarea
      label: Short Description
      required: true
    icon:
      type: text
      label: Icon Name
    service_model:
      type: text
      label: Service Model
    typical_roles:
      type: text
      label: Typical Roles
    delivery_timeline:
      type: text
      label: Delivery Timeline
    hero_stats:
      type: textarea
      label: "Hero Stats (YAML)"
    challenges:
      type: textarea
      label: "Challenges (YAML)"
    process:
      type: textarea
      label: "Process (YAML)"
    case_studies:
      type: text
      label: Related Case Studies

industry:
  label: Industry
  path_pattern: "/industries/{slug}"
  listing_title: "Industries"
  listing_subtitle: "Deep domain expertise across regulated and high-growth sectors"
  fields:
    short_description:
      type: textarea
      label: Short Description
      required: true
    icon:
      type: text
      label: Icon Name
    workforce_challenges:
      type: textarea
      label: "Workforce Challenges (YAML)"
    key_roles:
      type: text
      label: Key Roles
    compliance_notes:
      type: text
      label: Compliance Notes
    related_services:
      type: text
      label: Related Services

case_study:
  label: Case Study
  path_pattern: "/case-studies/{slug}"
  listing_title: "Case Studies"
  listing_subtitle: "Real results for real enterprises"
  fields:
    client_name:
      type: text
      label: Client Name
      required: true
    industry:
      type: text
      label: Industry
    service:
      type: text
      label: Service
    hires_delivered:
      type: text
      label: Hires Delivered
    time_to_fill:
      type: text
      label: Time to Fill
    retention_rate:
      type: text
      label: Retention Rate
    metrics:
      type: textarea
      label: "Key Metrics (YAML)"
    client_quote:
      type: textarea
      label: Client Quote
    client_quote_author:
      type: text
      label: Quote Author
    client_quote_role:
      type: text
      label: Quote Author Role
    featured_image:
      type: media
      label: Featured Image

person:
  label: Person
  path_pattern: "/team/{slug}"
  fields:
    role:
      type: text
      label: Role / Title
      required: true
    photo:
      type: media
      label: Photo
    linkedin:
      type: text
      label: LinkedIn URL
    department:
      type: text
      label: Department
    quote:
      type: textarea
      label: Personal Quote

job_posting:
  label: Job Posting
  path_pattern: "/careers/{slug}"
  fields:
    department:
      type: text
      label: Department
      required: true
    location:
      type: text
      label: Location
      required: true
    seniority:
      type: select
      label: Seniority Level
      options:
        - junior
        - mid
        - senior
        - lead
        - manager
        - director
    employment_type:
      type: select
      label: Employment Type
      options:
        - full-time
        - contract
        - part-time
    remote_policy:
      type: select
      label: Remote Policy
      options:
        - remote
        - hybrid
        - onsite
    requirements:
      type: textarea
      label: Requirements
    benefits:
      type: textarea
      label: Benefits
    apply_url:
      type: text
      label: Application URL

location:
  label: Location
  path_pattern: "/locations/{slug}"
  fields:
    city:
      type: text
      label: City
      required: true
    address:
      type: text
      label: Address
    country:
      type: text
      label: Country
      required: true
    photo:
      type: media
      label: Office Photo
    employee_count:
      type: number
      label: Employee Count
    specializations:
      type: text
      label: Specializations
    coordinates:
      type: text
      label: "Coordinates (lat,lng)"
