    eyebrow: "Gotowy, aby zacząć?"
    heading: "Zbudujmy coś wyjątkowego"
    description: "Opowiedz nam o swoim projekcie. Nasi architekci rozwiązań odpowiedzą w ciągu 24 godzin z dopasowaną propozycją."
